<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Skeleton Demo</title>
</head>

<body>

    <!-- HEADER: top of the page -->
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </nav>
    </header>

    <!-- MAIN: primary page content -->
    <main>

        <!-- ARTICLE: self-contained content -->
        <article>
            <h1>What is the Internet?</h1>
            <p>The Internet is a global network of interconnected computers...</p>
        </article>

        <!-- ASIDE: secondary related content / sidebar -->
        <aside>
            <h2>Related Topics</h2>
            <ul>
                <li>TCP/IP</li>
                <li>HTTP/HTTPS</li>
                <li>DNS</li>
            </ul>
        </aside>

    </main>

    <!-- FOOTER: bottom of the page -->
    <footer>
        <p>&copy; 2026 My Website. All rights reserved.</p>
    </footer>

</body>

</html>
